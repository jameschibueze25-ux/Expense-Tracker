<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Expense Tracker</title>
</head>
<body>
  <div id="tracker-container">
    <h1>My Expense Tracker</h1>
    
  
    <div id="input-section">
      <div>
        <label>Expense:</label>
        <input type="text" id="expense-name" placeholder="e.g., Groceries">
      </div>
      <div>
        <label>Amount:</label>
        <input type="number" id="expense-amount" placeholder="e.g., 50">
      </div>
      <button id="add-btn">Add Expense</button>
    </div>

    <div id="list-container">
      <ul id="expense-list">
    
      </ul>
    </div>

  
    <div id="total-section">
      <h3>Total Spent: $<span id="total">0</span></h3>
    </div>

    <div id="actions-section">
      <button id="export-pdf-btn">Export PDF</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
